name: CI + Deploy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "staging"]

jobs:
  # ── Job 1: Build & Lint ──────────────────────────────────────────────────────
  # Berjalan di semua branch dan pull request.
  # Menggunakan dummy env vars — tidak perlu database sungguhan saat build.
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/mydb"
      DIRECT_URL: "postgresql://postgres:password@localhost:5432/mydb"
      NEXTAUTH_SECRET: "dummy_secret_for_build_process_12345"
      NEXTAUTH_URL: "http://localhost:3000"

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Optional: aktifkan jika sudah ada test suite
      # - name: Test
      #   run: pnpm test --if-present

  # ── Job 2: E2E Test ──────────────────────────────────────────────────────────
  # Berjalan setelah build sukses.
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Setup Database
        run: pnpm prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/mydb"
          DIRECT_URL: "postgresql://postgres:password@localhost:5432/mydb"

      - name: Seed Database
        run: pnpm prisma db seed
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/mydb"
          DIRECT_URL: "postgresql://postgres:password@localhost:5432/mydb"

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm list @playwright/test --depth=0 | sed -n 's/.*@playwright\/test \([0-9.]*\).*/\1/p')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/mydb"
          DIRECT_URL: "postgresql://postgres:password@localhost:5432/mydb"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
          AUTH_SECRET: "dummy_secret_for_e2e_test"
          NEXTAUTH_SECRET: "dummy_secret_for_e2e_test"
          AUTH_URL: "http://localhost:3000"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH_TRUST_HOST: "true"
          NODE_ENV: "test"
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── Job 3: Deploy to Vercel ──────────────────────────────────────────────────
  # Hanya berjalan jika:
  #   1. Job "e2e-test" berhasil PASS  (needs: e2e-test)
  #   2. Event adalah push             (bukan pull_request)
  #   3. Branch adalah "staging" atau "main"
  #
  # Naming convention Vercel project (otomatis, tanpa VERCEL_PROJECT_ID):
  #   branch staging → {repo-name}-staging
  #   branch main    → {repo-name}-production
  #
  # Secrets yang dibutuhkan (set di level GitHub Organisasi, berlaku semua repo):
  #   VERCEL_TOKEN   → API token Vercel
  #   VERCEL_ORG_ID  → Team ID Vercel (team_xxxx)
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: e2e-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - uses: actions/checkout@v4

      # Tentukan nama project Vercel dan apakah ini production deployment
      - name: Set deploy target
        id: target
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "project_name=${REPO}-production" >> $GITHUB_OUTPUT
          else
            echo "project_name=${REPO}-staging" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Cek apakah Vercel project sudah ada.
      # Jika belum → buat otomatis via Vercel API dan link ke GitHub repo.
      # Juga set commandForIgnoringBuildStep="exit 0" agar Vercel tidak
      # auto-deploy dari GitHub webhook (deploy dikontrol penuh oleh job ini).
      - name: Get or create Vercel project
        id: vercel_project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'change_me_in_vercel_dashboard_32chars_min' }}
        run: |
          # teamId param hanya disertakan jika VERCEL_ORG_ID tidak kosong
          if [[ -n "$VERCEL_ORG_ID" ]]; then
            TEAM_PARAM="?teamId=${VERCEL_ORG_ID}"
          else
            TEAM_PARAM=""
          fi

          NEXTAUTH_URL_VALUE="https://${PROJECT_NAME}.vercel.app"

          # Cek apakah project sudah ada
          HTTP_STATUS=$(curl -s -o /tmp/vercel_res.json -w "%{http_code}" \
            "https://api.vercel.com/v9/projects/${PROJECT_NAME}${TEAM_PARAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")

          echo "GET project status: ${HTTP_STATUS}"

          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✅ Vercel project '${PROJECT_NAME}' sudah ada. Ensuring framework=nextjs..."
            curl -s -X PATCH \
              "https://api.vercel.com/v9/projects/${PROJECT_NAME}${TEAM_PARAM}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"framework":"nextjs"}' \
              | jq '{id,framework}' || true
          else
            echo "🆕 Project belum ada (HTTP ${HTTP_STATUS}), membuat baru..."

            # Bangun JSON payload dengan jq agar aman dari special characters
            PAYLOAD=$(jq -n \
              --arg name      "$PROJECT_NAME" \
              --arg repo      "${{ github.repository }}" \
              --arg db_url    "$DB_URL" \
              --arg secret    "$AUTH_SECRET" \
              --arg auth_url  "$NEXTAUTH_URL_VALUE" \
              '{
                name: $name,
                framework: "nextjs",
                gitRepository: {type: "github", repo: $repo},
                commandForIgnoringBuildStep: "exit 0",
                environmentVariables: [
                  {key: "DATABASE_URL",    value: $db_url,   type: "encrypted", target: ["production","preview","development"]},
                  {key: "NEXTAUTH_SECRET", value: $secret,   type: "encrypted", target: ["production","preview","development"]},
                  {key: "AUTH_SECRET",     value: $secret,   type: "encrypted", target: ["production","preview","development"]},
                  {key: "NEXTAUTH_URL",    value: $auth_url, type: "plain",      target: ["production","preview","development"]},
                  {key: "AUTH_URL",        value: $auth_url, type: "plain",      target: ["production","preview","development"]}
                ]
              }')

            # POST create project — tampilkan response jika gagal
            POST_STATUS=$(curl -s -o /tmp/vercel_res.json -w "%{http_code}" \
              -X POST \
              "https://api.vercel.com/v9/projects${TEAM_PARAM}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            echo "POST project status: ${POST_STATUS}"

            if [[ "$POST_STATUS" != "200" && "$POST_STATUS" != "201" ]]; then
              echo "❌ Gagal membuat Vercel project. Response:"
              cat /tmp/vercel_res.json
              exit 1
            fi

            echo "✅ Vercel project '${PROJECT_NAME}' berhasil dibuat."
          fi

          PROJECT_ID=$(jq -r '.id' /tmp/vercel_res.json)
          echo "project_id=${PROJECT_ID}" >> $GITHUB_OUTPUT
          echo "Project ID: ${PROJECT_ID}"

      # Buat .vercel/project.json agar Vercel CLI tahu ke project mana deploy dilakukan
      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo "{\"orgId\":\"${{ secrets.VERCEL_ORG_ID }}\",\"projectId\":\"${{ steps.vercel_project.outputs.project_id }}\"}" \
            > .vercel/project.json

      # Upsert env vars ke Vercel project (berlaku untuk project baru maupun yang sudah ada).
      # Menggunakan ?upsert=true agar key yang sudah ada ikut ter-update.
      - name: Upsert environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJECT_ID: ${{ steps.vercel_project.outputs.project_id }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'change_me_in_vercel_dashboard_32chars_min' }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
        run: |
          if [[ -z "$DB_URL" ]]; then
            echo "❌ SECRET 'DATABASE_URL' tidak ditemukan di GitHub. Abort."
            exit 1
          fi

          if [[ -n "$VERCEL_ORG_ID" ]]; then
            TEAM_PARAM="?teamId=${VERCEL_ORG_ID}&upsert=true"
          else
            TEAM_PARAM="?upsert=true"
          fi

          NEXTAUTH_URL_VALUE="https://${PROJECT_NAME}.vercel.app"

          PAYLOAD=$(jq -n \
            --arg db_url    "$DB_URL" \
            --arg secret    "$AUTH_SECRET" \
            --arg auth_url  "$NEXTAUTH_URL_VALUE" \
            '[
              {key: "DATABASE_URL",    value: $db_url,   type: "encrypted", target: ["production","preview","development"]},
              {key: "NEXTAUTH_SECRET", value: $secret,   type: "encrypted", target: ["production","preview","development"]},
              {key: "AUTH_SECRET",     value: $secret,   type: "encrypted", target: ["production","preview","development"]},
              {key: "NEXTAUTH_URL",    value: $auth_url, type: "plain",      target: ["production","preview","development"]},
              {key: "AUTH_URL",        value: $auth_url, type: "plain",      target: ["production","preview","development"]}
            ]')

          STATUS=$(curl -s -o /tmp/env_res.json -w "%{http_code}" \
            -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env${TEAM_PARAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Upsert env vars status: ${STATUS}"
          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "❌ Gagal upsert env vars. Response:"
            cat /tmp/env_res.json
            exit 1
          fi
          echo "✅ Environment variables (DATABASE_URL, NEXTAUTH_SECRET, NEXTAUTH_URL) berhasil di-update."

      # Install dependencies untuk menjalankan prisma migrate deploy
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Jalankan Prisma migrations ke database production (Supabase)
      # Idempotent: hanya apply migrasi yang belum diapply
      # continue-on-error: true karena Supabase mungkin pause (free tier) atau
      # memblokir IP GitHub Actions → deploy tetap jalan, jalankan migrasi manual jika perlu
      - name: Run Prisma Migrations
        continue-on-error: true
        timeout-minutes: 2
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      # Buat default admin user di database (idempotent)
      # Hanya jalan jika DEFAULT_ADMIN_EMAIL + DEFAULT_ADMIN_PASSWORD
      # di-set di GitHub Org Secrets
      - name: Setup Default Admin
        continue-on-error: true
        timeout-minutes: 1
        run: pnpm prisma generate && pnpm tsx scripts/setup-default-admin.ts
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          DEFAULT_ADMIN_NAME: ${{ secrets.DEFAULT_ADMIN_NAME }}

      # Inspect Vercel project before deploying
      - name: Inspect Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJECT_ID: ${{ steps.vercel_project.outputs.project_id }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
        run: |
          if [[ -n "$VERCEL_ORG_ID" ]]; then
            TEAM_PARAM="?teamId=${VERCEL_ORG_ID}"
          else
            TEAM_PARAM=""
          fi
          echo "=== Project info ==="
          curl -s "https://api.vercel.com/v9/projects/${PROJECT_NAME}${TEAM_PARAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            | jq '{id,name,framework,productionBranch,aliases:[.alias[]|select(.type=="SYSTEM")|.domain]}' \
            || echo "Failed to get project info"

          echo "=== Recent deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&limit=3${TEAM_PARAM:+&teamId=${VERCEL_ORG_ID}}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            | jq '.deployments[]|"\(.url) | \(.state) | \(.meta.githubCommitMessage // "")"' \
            || echo "Failed to list deployments"

      # Deploy source ke Vercel — Vercel build di server mereka (remote build)
      # Lebih reliable karena Vercel tahu framework=nextjs dan build environment-nya
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.vercel_project.outputs.project_id }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
        run: |
          echo "=== Starting remote deployment ==="
          # Use set -o pipefail so pipeline exit = vercel's exit, not tee's
          set -o pipefail
          vercel deploy --prod --token="${VERCEL_TOKEN}" 2>&1 | tee /tmp/vercel_deploy.log
          echo "=== Full deploy log ==="
          cat /tmp/vercel_deploy.log

          # Extract the deployment URL (last https:// line)
          DEPLOY_URL=$(grep -oE 'https://[^ ]+\.vercel\.app' /tmp/vercel_deploy.log | tail -1)
          echo "=== Deployment URL: ${DEPLOY_URL} ==="
          echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT

      - name: Verify deployment
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
        run: |
          PROD_URL="https://${PROJECT_NAME}.vercel.app"
          echo "Testing preview URL: ${DEPLOY_URL}"
          echo "Testing production URL: ${PROD_URL}"
          sleep 15
          for url in "${DEPLOY_URL}" "${PROD_URL}"; do
            if [[ -z "$url" ]]; then continue; fi
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "  ${url} → HTTP ${HTTP_CODE}"
          done